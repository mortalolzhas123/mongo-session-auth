<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Auth Demo</title>
</head>
<body>
    <h1>Assignment 4 Auth</h1>

    <h2>Register</h2>
    <input id="r_name" placeholder="name">
    <input id="r_email" placeholder="email">
    <input id="r_pass" placeholder="password" type="password">
    <button id="registerBtn">Register</button>

    <h2>Login</h2>
    <input id="l_email" placeholder="email">
    <input id="l_pass" placeholder="password" type="password">
    <button id="loginBtn">Login</button>

    <h2>Profile</h2>
    <button id="profileBtn">Load profile</button>
    <pre id="profileBox"></pre>

    <h2>Logout</h2>
    <button id="logoutBtn">Logout</button>

    <hr>
    <pre id="msg"></pre>

    <script src="app.js"></script>
</body>
</html>
